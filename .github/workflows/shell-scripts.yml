name: Shell scripts checks

on:
  push:
    paths:
      - "**/*.sh"
      - ".github/workflows/shell-scripts.yml"
      - "scripts/qa.sh"
  pull_request:
    paths:
      - "**/*.sh"
      - ".github/workflows/shell-scripts.yml"
      - "scripts/qa.sh"

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run unified QA checks
        run: bash ./scripts/qa.sh check
